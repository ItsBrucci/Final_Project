<html lang="en-US">
<head>
	<title>The Iron Jungle</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/styles.css">
	<script src="scripts/form.js" defer></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
	<link rel="shortcut icon" href="images/favicon.ico">
	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
	<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
	<link rel="icon" sizes="192x192" href="images/android-chrome-192.png">
</head>
<body>
	<div id="lvp">
		<!--Header area for the websitename and logo -->
		<header>
			<a href="index.html"><img src="images/logo.png" alt="The Iron Jungle"></a>
		</header>
		
		<!-- Nav Area-->
		<nav>
			<ul>
				<li><p><a href="index.html">Home</a></li>
				<li><p><a href="join.html">Join</a></p></li>
				<li><p><a href="classes.html">Classes</a></p></li>
			</ul>
		</nav>
		
		<div class="tabDesk">
			<img src="images/hero.jpg" alt="The gyms reception area" id="hero">
		</div>
		
		<!-- Use the main area to add the main content of the webpage -->
		<main id="formMain">
			
			<!--Form for creating a membership-->
			<form id="membershipForm" name="formGroup">
				
				<h1>Sign up Now</h1>
				<div class="formGroup">
					<fieldset>
						<legend>Personal Details</legend>
						<label for="fName">First Name</label>
						<input type="text" id="fName" name="fName">
						
						<label for="lName">Last Name</label>
						<input type="text" id="lName" name="lName">
						
						<label for="age">Age</label>
						<input type="text" id="age" name="age">
						
						<label for="phone">Phone Number</label>
						<input type="tel" id="phone" name="phone">
						
						<label for="addy1">Address Line 1</label>
						<input type="text" id="addy1" name="addy1">
						
						<label for="addy2">Address Line 2 (Optional)</label>
						<input type="text" id="addy2" name="addy2">
						
						<label for="city">City</label>
						<input type="text" id="city" name="city">
						
						<label for="state">State</label>
						<input type="text" id="state" name="state">
						
						<label for="zip">Zip</label>
						<input type="text" id="zip" name="zip">
					</fieldset>
				</div>
				
				<div class="formGroup">			
					<fieldset>
						<legend>Log-In Info</legend>
						<label for="email">Email</label>
						<input type="email" id="email" name="email">
						
						<label for="password">Password</label>
						<input type="password" id="password" name="password">
					</fieldset>
				</div>
				
				<div class="formGroup">			
					<fieldset>
						<legend>Membership Type</legend>
							<input type="radio" id="membershipType" name="basicMem">
							<label for="basicMem">Basic</label>
							<input type="radio" id="membershipType" name="midMem">
							<label for="midMem">Ultra</label>
							<input type="radio" id="membershipType" name="highMem">
							<label for="highMem">Premium</label>
					</fieldset>
				</div>
				
				<div class="btnContiner">
					<button type="submit" onClick="doSubmit()">Sign Up</button>
					<button type="button" onClick="doClear()">Clear Entries</button>
				</div>

			</form>
							
			
		</main>
		
		<!-- Use the footer area to add webpage footer content -->
		<footer>
			<p>&copy; Copyright 2026. All Rights Reserved.</p>
			<p><a href="mailto:TheIronJungle@mail.com">TheIronJungle@mail.com</a></p>
			<p><a href="tel:7185555555">(718) 555-5555</a></p>
		</footer>
	</div>
</body>
</html>
